<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Author — Wayfarer</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='7' fill='%23111111'/%3E%3Cpath d='M16 3 L19 16 L16 29 L13 16 Z' fill='%234ECDC4'/%3E%3Cpath d='M3 16 L16 13 L29 16 L16 19 Z' fill='%234ECDC4' opacity='0.6'/%3E%3Ccircle cx='16' cy='16' r='2.4' fill='%23ffffff'/%3E%3C/svg%3E" />
<link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
<style>
  :root { --ink:#111; --teal:#2aa89f; --muted:#6b6b6b; --line:rgba(0,0,0,0.1);
    --ui:"Inter Tight",sans-serif; --smooth:cubic-bezier(0.22,1,0.36,1); }
  * { box-sizing:border-box; margin:0; padding:0; }
  body { font-family:var(--ui); color:var(--ink); background:#fdfcfb; -webkit-font-smoothing:antialiased;
    background-image:
      radial-gradient(ellipse 80% 60% at 20% 10%, rgba(78,205,196,0.04), transparent 60%),
      linear-gradient(160deg, #ffffff 0%, #fbfaf8 60%, #f7f4ef 100%);
    background-attachment:fixed; min-height:100vh; }
  a { color:inherit; text-decoration:none; }

  .wf-nav { position:sticky; top:0; z-index:50; background:rgba(253,252,251,0.9); backdrop-filter:blur(10px);
    border-bottom:1px solid var(--line); display:flex; align-items:center; justify-content:space-between; padding:14px 32px; }
  .wf-brand { display:flex; align-items:center; gap:10px; }
  .wf-brand .wm { font-size:20px; font-weight:700; letter-spacing:-0.01em; }
  .wf-navlinks { display:flex; gap:22px; align-items:center; }
  .wf-navlinks a { font-size:14px; color:#222; transition:color .3s var(--smooth); }
  .wf-navlinks a:hover { color:var(--teal); }
  .wf-saved-pill { display:inline-flex; align-items:center; gap:7px; font-size:13px; font-weight:600;
    border:1px solid var(--line); border-radius:9999px; padding:7px 14px; }
  .wf-saved-pill .ct { background:var(--teal); color:#fff; border-radius:9999px; min-width:18px; height:18px;
    display:inline-flex; align-items:center; justify-content:center; font-size:11px; padding:0 5px; }

  .profile { max-width:1000px; margin:0 auto; padding:56px 32px 24px; display:flex; gap:28px; align-items:flex-start; }
  .avatar { width:96px; height:96px; border-radius:50%; flex-shrink:0; display:flex; align-items:center; justify-content:center;
    font-size:2rem; font-weight:800; color:#fff; }
  .pinfo .crumb { font-size:13px; color:var(--muted); margin-bottom:8px; }
  .pinfo .crumb a:hover { color:var(--teal); }
  .pinfo h1 { font-size:clamp(2rem,4vw,3rem); font-weight:800; letter-spacing:-0.02em; line-height:1.05; }
  .pinfo .handle { color:var(--teal); font-weight:600; font-size:1rem; margin:6px 0 14px; }
  .pinfo .bio { font-size:1.05rem; color:#333; line-height:1.6; max-width:560px; margin-bottom:14px; }
  .pinfo .meta { display:flex; gap:20px; font-size:0.85rem; color:var(--muted); flex-wrap:wrap; }
  .pinfo .meta b { color:var(--ink); font-weight:600; }
  @media (max-width:640px){ .profile{ flex-direction:column; } }

  .section-rule { max-width:1000px; margin:0 auto; padding:24px 32px 0; }
  .section-rule h2 { font-size:1.4rem; font-weight:700; letter-spacing:-0.01em; padding-bottom:14px; border-bottom:2px solid var(--ink); }

  .grid { max-width:1000px; margin:0 auto; padding:28px 32px 80px; display:grid; grid-template-columns:repeat(2,1fr); gap:20px; }
  @media (max-width:760px){ .grid{ grid-template-columns:1fr; } }
  .card { border-radius:16px; overflow:hidden; background:#fff; border:1px solid var(--line); display:flex; flex-direction:column;
    transition:transform .5s var(--smooth), box-shadow .5s var(--smooth); position:relative; }
  .card:hover { transform:translateY(-5px); box-shadow:0 22px 46px rgba(0,0,0,0.12); }
  .card.soon { opacity:0.9; }
  .card-art { height:170px; position:relative; overflow:hidden; }
  .card-art svg { position:absolute; inset:0; width:100%; height:100%; }
  .card-badge { position:absolute; top:14px; right:14px; z-index:2; background:#111; color:#fff; font-size:10px;
    font-weight:700; letter-spacing:0.1em; text-transform:uppercase; padding:5px 10px; border-radius:9999px; }
  .card-body { padding:18px; }
  .card-place { font-size:0.72rem; font-weight:600; letter-spacing:0.08em; text-transform:uppercase; color:var(--muted); margin-bottom:6px; }
  .card h3 { font-size:1.25rem; font-weight:800; letter-spacing:-0.01em; margin-bottom:6px; }
  .card p { font-size:0.92rem; color:var(--muted); line-height:1.5; margin-bottom:12px; }
  .card-foot { font-size:0.78rem; font-weight:700; letter-spacing:0.05em; text-transform:uppercase; }

  footer { border-top:1px solid var(--line); padding:32px; text-align:center; font-size:0.8rem; color:var(--muted); }
  .notfound { max-width:1000px; margin:0 auto; padding:80px 32px; text-align:center; color:var(--muted); }
</style>
</head>
<body>
  <nav class="wf-nav">
    <a class="wf-brand" href="wayfare-standalone.html">
      <svg width="26" height="26" viewBox="0 0 32 32"><circle cx="16" cy="16" r="15" fill="none" stroke="#2aa89f" stroke-width="1.5" opacity="0.5"/><path d="M16 2 L19 16 L16 30 L13 16 Z" fill="#2aa89f"/><path d="M2 16 L16 13 L30 16 L16 19 Z" fill="#2aa89f" opacity="0.6"/><circle cx="16" cy="16" r="2.4" fill="#111"/></svg>
      <span class="wm">Wayfarer</span>
    </a>
    <div class="wf-navlinks">
      <a href="guides.html">All guides</a>
      <a href="share.html">Share your guide</a>
      <a class="wf-saved-pill" href="saved.html">Saved <span class="ct" id="savedCt">0</span></a>
    </div>
  </nav>

  <div id="content"></div>

  <footer>© 2026 Wayfarer · A place to get lost reading about places.</footer>

<script src="wayfarer-shared.js"></script>
<script>
  const W = window.Wayfarer;
  const params = new URLSearchParams(location.search);
  const handle = params.get("author");
  const author = handle && W.authors[handle];
  const content = document.getElementById("content");

  const AVATAR_COLORS = {
    shizuka:"#e8826b", goldenroute:"#c9a24b", seorak:"#3a5249", hellotoronto:"#1452b8",
    thelongquiet:"#5b7d8c", sevenhills:"#3a6ea5", underaurora:"#1f3b4d"
  };

  if (!author) {
    content.innerHTML = '<div class="notfound"><h1>Author not found</h1><p style="margin-top:12px;">' +
      '<a href="guides.html" style="color:#2aa89f;font-weight:600;">Browse all guides →</a></p></div>';
  } else {
    const initials = author.name.split(" ").map(function(w){return w[0];}).slice(0,2).join("").toUpperCase();
    const guides = W.guidesByAuthor(handle);
    const liveCount = guides.filter(function(g){return g.status==="live";}).length;
    const color = AVATAR_COLORS[handle] || "#2aa89f";

    let cards = "";
    guides.forEach(function(g){
      const live = g.status === "live";
      cards += (live ? '<a class="card" href="' + g.file + '">' : '<div class="card soon">') +
        '<div class="card-art">' + W.cardArt(g, 400, 170) + (live ? '' : '<span class="card-badge">Coming soon</span>') + '</div>' +
        '<div class="card-body"><div class="card-place">' + g.place + '</div>' +
        '<h3>' + g.title + '</h3><p>' + g.blurb + '</p>' +
        '<div class="card-foot">' + (live ? 'Read the guide →' : 'In progress') + '</div></div>' +
        (live ? '</a>' : '</div>');
    });

    content.innerHTML =
      '<div class="profile">' +
        '<div class="avatar" style="background:' + color + ';">' + initials + '</div>' +
        '<div class="pinfo">' +
          '<div class="crumb"><a href="guides.html">Guides</a> · Author</div>' +
          '<h1>' + author.name + '</h1>' +
          '<div class="handle">@' + author.handle + '</div>' +
          '<p class="bio">' + author.bio + '</p>' +
          '<div class="meta"><span><b>' + liveCount + '</b> published guide' + (liveCount===1?'':'s') + '</span>' +
            '<span>Based in <b>' + author.based + '</b></span>' +
            '<span>On Wayfarer since <b>' + author.since + '</b></span></div>' +
        '</div>' +
      '</div>' +
      '<div class="section-rule"><h2>Guides by ' + author.name + '</h2></div>' +
      '<div class="grid">' + cards + '</div>';
  }

  function refreshSavedCount(){ document.getElementById("savedCt").textContent = W.Saved.count(); }
  document.addEventListener("wf:saved-changed", refreshSavedCount);
  refreshSavedCount();
</script>
</body>
</html>
