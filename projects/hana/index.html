  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Gowun+Batang:wght@400;700&family=Gowun+Dodum&family=Manrope:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --paper: #fff3df; --surface: #fffaf1; --ink: #1f1b16; --muted: #73685b;
      --line: #ecdcc8; --accent: #10a67a; --accent-soft: #dff8eb;
      --rose: #ff5a7a; --gold: #f5b83d; --blue: #4f7cff; --orange: #ff8a3d; --mint: #7ce7b3;
      --shadow: 0 20px 55px rgba(112, 76, 35, 0.13);
      --radius: 20px;
      --font-body: "Manrope", "Gowun Dodum", "Apple SD Gothic Neo", "Malgun Gothic", "Segoe UI", Arial, sans-serif;
      --font-display: "Fraunces", "Gowun Batang", Georgia, "Apple SD Gothic Neo", serif;
      --font-ko: "Gowun Dodum", "Noto Sans KR", "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
      --font-ko-display: "Gowun Batang", "Noto Serif KR", "Apple SD Gothic Neo", serif;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html { scroll-behavior: smooth; }
    body {
      font-family: var(--font-body); color: var(--ink); background: var(--paper);
      min-height: 100svh; -webkit-font-smoothing: antialiased;
    }
    body::before {
      content: ""; position: fixed; inset: 0; z-index: -1; pointer-events: none;
      background:
        radial-gradient(640px 420px at 88% -6%, rgba(124, 231, 179, 0.38), transparent 65%),
        radial-gradient(560px 400px at -8% 30%, rgba(245, 184, 61, 0.24), transparent 60%),
        radial-gradient(620px 460px at 70% 108%, rgba(255, 138, 61, 0.18), transparent 60%);
    }
    body::after {
      content: "한"; position: fixed; right: -4rem; bottom: -7rem; z-index: -1; pointer-events: none;
      font: 700 26rem/1 var(--font-ko-display); color: rgba(31, 27, 22, 0.04);
      transform: rotate(-6deg); user-select: none;
    }
    ::selection { background: var(--accent-soft); }
    button { font-family: inherit; color: inherit; }
    :focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; border-radius: 6px; }
    .skip { position: fixed; top: -50px; left: 1rem; z-index: 300; background: var(--ink); color: #fff; padding: 0.55rem 0.9rem; border-radius: 0 0 10px 10px; font-size: 0.75rem; text-decoration: none; transition: top 0.2s; }
    .skip:focus { top: 0; }

    /* ---------- top bar ---------- */
    .top {
      position: sticky; top: 0; z-index: 60; position: -webkit-sticky;
      display: grid; grid-template-columns: 1fr auto 1fr; align-items: center; gap: 0.7rem;
      padding: 0.65rem clamp(0.9rem, 3vw, 1.6rem);
      background: rgba(255, 243, 223, 0.86); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--line);
    }
    .top::after { content: ""; position: absolute; left: 0; right: 0; bottom: -1px; height: 1px;
      background: linear-gradient(90deg, transparent, rgba(16,166,122,0.45), rgba(245,184,61,0.45), transparent); }
    .back {
      display: inline-flex; align-items: center; gap: 6px;
      font-size: 0.74rem; font-weight: 600; color: var(--muted); text-decoration: none;
      border: 1px solid var(--line); background: rgba(255,255,255,0.6);
      padding: 0.42rem 0.7rem; border-radius: 999px; white-space: nowrap;
    }
    .back:hover { color: var(--ink); border-color: var(--muted); }
    .top-left { display: flex; align-items: center; gap: 0.85rem; justify-self: start; min-width: 0; }
    .top-center { justify-self: center; }
    .top-right { display: flex; align-items: center; gap: 0.55rem; justify-self: end; }
    .brand { display: flex; align-items: center; gap: 0.85rem; text-decoration: none; color: inherit; min-width: 0; }
    .brand-tile {
      width: 34px; height: 34px; border-radius: 10px; flex: none;
      background: linear-gradient(135deg, var(--accent), #0c8a66);
      color: #fff; font: 700 1.05rem/34px var(--font-ko-display); text-align: center;
      box-shadow: 0 6px 16px rgba(16, 166, 122, 0.35);
    }
    .brand b { font-family: var(--font-display); font-weight: 700; font-size: 1rem; display: block; line-height: 1.1; }
    .brand small { font-size: 0.62rem; color: var(--muted); font-weight: 600; letter-spacing: 0.04em; }
    .tabs { display: flex; gap: 0.3rem; background: rgba(255,255,255,0.55); border: 1px solid var(--line); border-radius: 999px; padding: 0.22rem; }
    .tabs button {
      border: 0; background: transparent; cursor: pointer;
      font-weight: 700; font-size: 0.78rem; color: var(--muted);
      padding: 0.42rem 0.95rem; border-radius: 999px; transition: all 0.2s;
    }
    .tabs button[aria-selected="true"] { background: var(--ink); color: #fff; }
    .streak {
      display: inline-flex; align-items: center; gap: 0.35rem;
      font-weight: 800; font-size: 0.8rem; color: #9a6b00;
      background: rgba(245, 184, 61, 0.18); border: 1px solid rgba(245, 184, 61, 0.5);
      padding: 0.4rem 0.7rem; border-radius: 999px; white-space: nowrap;
    }
    .gear {
      width: 38px; height: 38px; border-radius: 12px; cursor: pointer; flex: none;
      border: 1px solid var(--line); background: rgba(255,255,255,0.6); font-size: 1rem;
    }
    .gear:hover { border-color: var(--muted); }

    /* ---------- layout ---------- */
    main { max-width: 720px; margin: 0 auto; padding: clamp(1.1rem, 3.5vw, 2rem) clamp(0.9rem, 3.5vw, 1.4rem) 6.5rem; }
    .view[hidden] { display: none; }
    .card {
      background: var(--surface); border: 1px solid var(--line); border-radius: var(--radius);
      box-shadow: var(--shadow); padding: clamp(1.05rem, 3vw, 1.5rem); margin-bottom: 1rem;
    }
    h1, h2, h3 { font-family: var(--font-display); letter-spacing: -0.01em; }
    .kicker { font-size: 0.68rem; font-weight: 800; letter-spacing: 0.14em; text-transform: uppercase; color: var(--accent); margin-bottom: 0.5rem; }
    .muted { color: var(--muted); }


    /* ---------- practice hero ---------- */
    .hero-card {
      position: relative; overflow: hidden;
      border-radius: 24px; border: 1px solid rgba(16, 166, 122, 0.22);
      padding: clamp(1.2rem, 3.5vw, 1.7rem) clamp(1.1rem, 3.5vw, 1.6rem) 0;
      margin-bottom: 1.2rem;
      background:
        radial-gradient(115% 80% at 16% 18%, #fff9f0 0%, rgba(255,249,240,0) 55%),
        radial-gradient(95% 75% at 86% 92%, rgba(16,166,122,0.18) 0%, rgba(16,166,122,0) 60%),
        radial-gradient(80% 85% at 72% 8%, rgba(255,166,120,0.20) 0%, rgba(255,166,120,0) 55%),
        var(--surface);
      box-shadow: var(--shadow);
    }
    .hero-jamo { position: absolute; font-family: var(--font-ko-display); font-weight: 700; color: rgba(31,27,22,0.06); pointer-events: none; user-select: none; line-height: 1; }
    .hero-jamo.j1 { font-size: 7.5rem; top: -1.6rem; right: 14%; transform: rotate(-8deg); }
    .hero-jamo.j2 { font-size: 5rem; right: 2%; bottom: 28%; transform: rotate(10deg); color: rgba(16,166,122,0.1); }
    .hero-jamo.j3 { font-size: 4.2rem; left: 38%; bottom: -0.8rem; transform: rotate(-12deg); color: rgba(245,184,61,0.16); }
    .hero-main { position: relative; display: flex; align-items: center; justify-content: space-between; gap: 1.2rem; }
    .hero-kicker { font: 700 0.68rem var(--font-body); letter-spacing: 0.16em; text-transform: uppercase; color: var(--accent); margin-bottom: 0.45rem; }
    .hero-card h1 { font-size: clamp(1.7rem, 5vw, 2.3rem); font-weight: 600; letter-spacing: -0.015em; line-height: 1.08; }
    .hero-line { font-size: 0.78rem; font-weight: 600; color: var(--muted); margin-top: 0.55rem; max-width: 44ch; }
    .hero-card .dayring { width: 70px; height: 70px; flex: none; filter: drop-shadow(0 6px 14px rgba(16,166,122,0.25)); }
    .hero-card .dayring text { font-size: 0.56rem; }
    .pod {
      position: relative; display: grid; grid-template-columns: auto 1fr auto; align-items: center; gap: 0.8rem;
      margin: 1.1rem calc(-1 * clamp(1.1rem, 3.5vw, 1.6rem)) 0; padding: 0.85rem clamp(1.1rem, 3.5vw, 1.6rem);
      border-top: 1px dashed rgba(31,27,22,0.14); background: rgba(255,255,255,0.45);
    }
    .pod .speak { width: 38px; height: 38px; background: #fff; }
    .pod-ko { font: 400 1.2rem var(--font-ko-display); display: block; }
    .pod-en { font-size: 0.7rem; color: var(--muted); display: block; margin-top: 0.1rem; }
    .pod-tag { font: 700 0.58rem var(--font-body); letter-spacing: 0.14em; text-transform: uppercase; color: rgba(115,104,91,0.75); white-space: nowrap; }
    @media (max-width: 560px) {
      .hero-jamo.j1 { font-size: 5.5rem; right: 4%; }
      .hero-jamo.j2 { display: none; }
      .hero-card .dayring { width: 58px; height: 58px; }
      .pod-tag { display: none; }
    }

    /* ---------- today ---------- */
    .today-head { display: flex; align-items: center; justify-content: space-between; gap: 0.8rem; flex-wrap: wrap; margin-bottom: 1rem; }
    .today-left { display: flex; align-items: center; gap: 0.85rem; }
    .dayring { width: 52px; height: 52px; flex: none; }
    .dayring circle { fill: none; stroke-width: 5; stroke-linecap: round; }
    .dayring .track { stroke: #f0e3cc; }
    .dayring .arc { stroke: url(#ringGrad); transform: rotate(-90deg); transform-origin: 50% 50%; transition: stroke-dashoffset 0.5s cubic-bezier(0.16,1,0.3,1); }
    .dayring text { font: 800 0.6rem var(--font-body); fill: var(--ink); }
    .today-head h1 { font-size: clamp(1.5rem, 4.5vw, 2rem); font-weight: 600; letter-spacing: -0.015em; }
    .today-date { font-size: 0.74rem; font-weight: 700; color: var(--muted); }
    .chips { display: flex; gap: 0.45rem; flex-wrap: wrap; margin-bottom: 1.1rem; }
    .chip { font-size: 0.68rem; font-weight: 700; color: var(--muted); border: 1px solid var(--line); background: rgba(255,255,255,0.55); padding: 0.34rem 0.7rem; border-radius: 999px; }
    .chip b { color: var(--ink); }
    .chip.due b { color: var(--rose); }

    .plan { position: relative; padding-left: 1.35rem; }
    .plan::before { content: ""; position: absolute; left: 0.55rem; top: 1.4rem; bottom: 1.4rem; width: 2px;
      background: repeating-linear-gradient(180deg, var(--line) 0 6px, transparent 6px 12px); border-radius: 2px; }
    .step {
      position: relative;
      display: grid; grid-template-columns: 44px 1fr auto; align-items: center; gap: 0.9rem;
      width: 100%; text-align: left; cursor: pointer;
      background: linear-gradient(160deg, #fffdf7, var(--surface)); border: 1px solid var(--line); border-radius: 18px;
      padding: 0.95rem 1.05rem; margin-bottom: 0.65rem; transition: transform 0.18s, box-shadow 0.18s, border-color 0.18s;
    }
    .step::before { content: ""; position: absolute; left: -1.06rem; top: 50%; width: 9px; height: 9px; border-radius: 50%;
      transform: translateY(-50%); background: var(--line); box-shadow: 0 0 0 4px var(--paper); }
    .step[data-step="review"]::before { background: var(--gold); }
    .step[data-step="learn"]::before { background: var(--accent); }
    .step[data-step="speak"]::before { background: var(--blue); }
    .step[data-step="review"] .step-num { background: rgba(245,184,61,0.18); color: #9a6b00; }
    .step[data-step="speak"] .step-num { background: #e8efff; color: var(--blue); }
    .step[data-step="review"].is-done .step-num { background: var(--gold); color: #fff; }
    .step[data-step="speak"].is-done .step-num { background: var(--blue); color: #fff; }
    .step:hover { transform: translateY(-2px); box-shadow: var(--shadow); border-color: #ddc9ad; }
    .step-num {
      width: 44px; height: 44px; border-radius: 14px; font-size: 1.05rem; display: grid; place-items: center;
      font-weight: 800; font-size: 0.95rem; color: var(--accent); background: var(--accent-soft);
    }
    .step.is-done .step-num { background: var(--accent); color: #fff; }
    .step-title { font-weight: 800; font-size: 0.95rem; }
    .step-sub { font-size: 0.74rem; color: var(--muted); margin-top: 0.15rem; }
    .step-go { font-weight: 800; color: var(--accent); font-size: 1.05rem; }
    .step.is-done { opacity: 0.78; }
    .step.is-done .step-go { color: var(--accent); }

    .banner {
      position: relative; overflow: hidden;
      border-radius: var(--radius); padding: 1.1rem 1.3rem; margin-bottom: 1rem;
      background: linear-gradient(120deg, var(--accent-soft), rgba(245, 184, 61, 0.28));
      border: 1px solid rgba(16, 166, 122, 0.35);
      display: flex; align-items: center; gap: 0.8rem; font-weight: 700;
    }
    .banner::after { content: ""; position: absolute; top: 0; bottom: 0; width: 60px;
      background: linear-gradient(100deg, transparent, rgba(255,255,255,0.65), transparent);
      animation: shine 3.2s ease-in-out infinite; }
    @keyframes shine { 0% { left: -80px; } 55%, 100% { left: 110%; } }
    .banner .big { font-size: 1.5rem; }
    .foot-note { font-size: 0.72rem; color: var(--muted); line-height: 1.65; border-left: 3px solid var(--mint); padding-left: 0.8rem; margin-top: 1.4rem; }

    /* intro / quick check */
    .intro h2 { font-size: clamp(1.45rem, 4.5vw, 1.9rem); font-weight: 600; margin-bottom: 0.55rem; letter-spacing: -0.01em; }
    .intro p { font-size: 0.86rem; line-height: 1.7; color: var(--muted); max-width: 46ch; }
    .intro .btn-row { margin-top: 1.1rem; }
    .qc-q { font-weight: 800; font-size: 1rem; margin: 0.9rem 0 0.7rem; }
    .qc-progress { font-size: 0.68rem; font-weight: 700; color: var(--muted); letter-spacing: 0.08em; }

    /* ---------- buttons ---------- */
    .btn-row { display: flex; gap: 0.55rem; flex-wrap: wrap; }
    .btn {
      border: 0; cursor: pointer; font-weight: 800; font-size: 0.84rem;
      background: linear-gradient(135deg, var(--accent), #0c8a66); color: #fff; border-radius: 999px;
      padding: 0.78rem 1.35rem; transition: transform 0.18s, box-shadow 0.18s;
      box-shadow: 0 10px 24px rgba(16, 166, 122, 0.3);
    }
    .btn:hover { transform: translateY(-2px); }
    .btn:active, .step:active, .lsn:active { transform: scale(0.985); }
    .btn.ghost { background: rgba(255,255,255,0.65); color: var(--ink); border: 1px solid var(--line); box-shadow: none; }
    .btn.ghost:hover { border-color: var(--muted); }
    .btn.rose { background: var(--rose); box-shadow: 0 10px 24px rgba(255, 90, 122, 0.3); }
    .btn.small { padding: 0.5rem 0.9rem; font-size: 0.74rem; }
    .btn:disabled { opacity: 0.45; cursor: default; transform: none; }

    /* ---------- path ---------- */
    .path-meter { display: flex; align-items: center; gap: 0.8rem; margin-bottom: 1.2rem; }
    .path-meter .bar { flex: 1; height: 8px; border-radius: 99px; background: #f0e3cc; overflow: hidden; }
    .path-meter .bar i { display: block; height: 100%; background: linear-gradient(90deg, var(--accent), var(--mint)); border-radius: 99px; transition: width 0.6s cubic-bezier(0.16,1,0.3,1); }
    .path-meter b { font-size: 0.78rem; white-space: nowrap; }
    .path-list { position: relative; padding-left: 0; }
    .path-list::before { content: ""; position: absolute; left: 21px; top: 1.6rem; bottom: 1.6rem; width: 2px;
      background: repeating-linear-gradient(180deg, var(--line) 0 6px, transparent 6px 12px); }
    .lsn {
      position: relative;
      display: grid; grid-template-columns: 44px 1fr auto; align-items: center; gap: 0.9rem;
      width: 100%; text-align: left; cursor: pointer;
      background: var(--surface); border: 1px solid var(--line); border-radius: 16px;
      padding: 0.85rem 1rem; margin-bottom: 0.55rem; transition: transform 0.18s, box-shadow 0.18s;
    }
    .lsn:hover { transform: translateY(-2px); box-shadow: var(--shadow); }
    .lsn-num {
      width: 44px; height: 44px; border-radius: 50%; display: grid; place-items: center;
      font-weight: 800; border: 2px dashed var(--line); color: var(--muted); background: #fff; position: relative; z-index: 1;
    }
    .lsn.is-done .lsn-num { border: 0; background: linear-gradient(135deg, var(--accent), #0c8a66); color: #fff; box-shadow: 0 6px 14px rgba(16,166,122,0.35); }
    .lsn.is-current .lsn-num { border: 2px solid var(--accent); color: var(--accent); }
    .lsn-title { font-weight: 800; font-size: 0.95rem; }
    .lsn-meta { display: flex; gap: 0.45rem; align-items: center; margin-top: 0.2rem; }
    .tagchip { font-size: 0.6rem; font-weight: 800; letter-spacing: 0.06em; text-transform: uppercase; padding: 0.18rem 0.5rem; border-radius: 999px; background: var(--accent-soft); color: #0c7d5d; }
    .tagchip.t-Alphabet { background: #e8ecff; color: #3a5fd9; }
    .tagchip.t-Food { background: #ffe9d6; color: #c05f12; }
    .tagchip.t-Travel { background: #fff3c9; color: #94700a; }
    .tagchip.t-Polite { background: #ffe3e9; color: #c2335a; }
    .lsn-focus { font-size: 0.72rem; color: var(--muted); }
    .lsn-state { font-size: 0.72rem; font-weight: 800; color: var(--muted); }
    .lsn.is-done .lsn-state { color: var(--accent); }

    /* ---------- library ---------- */
    .lib-bar { display: flex; gap: 0.6rem; flex-wrap: wrap; align-items: center; margin-bottom: 1rem; }
    .search {
      flex: 1; min-width: 180px;
      border: 1px solid var(--line); border-radius: 999px; background: rgba(255,255,255,0.7);
      padding: 0.62rem 1rem; font: 600 0.84rem var(--font-body); color: var(--ink);
    }
    .search:focus { outline: none; border-color: var(--accent); }
    .seg { display: flex; gap: 0.25rem; background: rgba(255,255,255,0.55); border: 1px solid var(--line); border-radius: 999px; padding: 0.2rem; }
    .seg button { border: 0; background: transparent; cursor: pointer; font-weight: 800; font-size: 0.72rem; color: var(--muted); padding: 0.4rem 0.8rem; border-radius: 999px; }
    .seg button[aria-selected="true"] { background: var(--ink); color: #fff; }
    .lib-group { font-size: 0.68rem; font-weight: 800; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); margin: 1.1rem 0 0.5rem; }
    .ph {
      display: grid; grid-template-columns: 10px 1fr auto auto; align-items: center; gap: 0.8rem;
      width: 100%; text-align: left; cursor: pointer;
      background: var(--surface); border: 1px solid var(--line); border-radius: 14px;
      padding: 0.68rem 0.9rem; margin-bottom: 0.45rem;
    }
    .ph:hover { border-color: #ddc9ad; }
    .ph-dot { width: 10px; height: 10px; border-radius: 50%; background: var(--line); }
    .ph-dot.d-new { background: var(--rose); box-shadow: 0 0 0 3px rgba(255,90,122,0.18); }
    .ph-dot.d-mid { background: var(--gold); box-shadow: 0 0 0 3px rgba(245,184,61,0.2); }
    .ph-dot.d-ok { background: var(--accent); box-shadow: 0 0 0 3px rgba(16,166,122,0.18); }
    .ph-ko { font: 400 1.12rem var(--font-ko); }
    .ph-en { font-size: 0.7rem; color: var(--muted); margin-top: 0.1rem; }
    .ph-note-flag { font-size: 0.85rem; }
    .speak {

const phraseOf = id => { const [l, p] = id.split("-").map(Number); return (lessons[l] && lessons[l].phrases[p]) || null; };
const esc = s => String(s).replace(/[&<>"]/g, c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" }[c]));
const sample = (arr, n) => { const a = arr.slice(); for (let i = a.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1));[a[i], a[j]] = [a[j], a[i]]; } return a.slice(0, n); };
const clamp = (v, a, b) => Math.min(b, Math.max(a, v));

function toast(msg) {
  const t = $("#toast"); t.textContent = msg; t.classList.add("show");
  clearTimeout(toast._t); toast._t = setTimeout(() => t.classList.remove("show"), 2400);
}

/* ---------- state ---------- */
const KEY = "hana.v2";
function defaultState() {
  return {
    v: 2, goalMin: 15, lesson: 0,
    done: lessons.map(() => false),
    srs: {}, mistakes: [], notes: {}, legacyNote: "",
    streak: { days: 0, last: "" },
    voice: { name: "", rate: 0.95, pitch: 1 },
    seenIntro: false,
    counters: { reviews: 0, quizzes: 0, shadows: 0 },
    today: { date: "", review: false, learn: false, speak: false }
  };
}
function fill(s) { /* tolerate missing fields from older v2 saves */
  const d = defaultState();
  for (const k in d) if (!(k in s)) s[k] = d[k];
  if (!Array.isArray(s.done) || s.done.length !== lessons.length) s.done = lessons.map((_, i) => !!(s.done && s.done[i]));
  return s;
}
function legacyId(entry) { /* normalize a legacy review/mistake entry to "l-p" */
  try {
    if (typeof entry === "string" && /^\d+-\d+$/.test(entry)) return entry;
    if (Array.isArray(entry) && entry.length >= 2) return pid(+entry[0], +entry[1]);
    if (entry && typeof entry === "object") {
      const l = entry.lesson != null ? entry.lesson : entry.lessonIndex;
      const p = entry.phrase != null ? entry.phrase : entry.phraseIndex;
      if (l != null && p != null) return pid(+l, +p);
    }
  } catch (e) { }
  return null;
}
function migrate() {
  const LK = k => localStorage.getItem("minimalKorean" + k);
  const sentinel = ["Completed", "ReviewQueue", "PhraseMastery", "StreakDays", "PlacementDone", "Notes", "Mistakes"];
  let found = false;
  try { found = sentinel.some(k => LK(k) !== null); } catch (e) { return null; }
  if (!found) return null;
  const s = defaultState();
  const J = (k, fb) => { try { const v = LK(k); return v == null ? fb : JSON.parse(v); } catch (e) { return fb; } };
  try {
    /* lessons completed */
    const comp = J("Completed", []);
    if (Array.isArray(comp)) comp.forEach((v, i) => {
      if (typeof v === "number" && lessons[v]) s.done[v] = true;
      else if (v === true && lessons[i]) s.done[i] = true;
    });
    /* mastery -> srs boxes */
    const mastery = J("PhraseMastery", {});
    if (mastery && typeof mastery === "object") Object.keys(mastery).forEach(k => {
      const id = legacyId(k) || (/^\d+-\d+$/.test(k) ? k : null);
      if (!id || !phraseOf(id)) return;
      const v = mastery[k]; const status = (v && v.status) || v;
      if (status === "mastered") s.srs[id] = { box: 3, due: Date.now() + 7 * DAY, lapses: 0 };
      else s.srs[id] = { box: 1, due: Date.now(), lapses: 0 };
    });
    /* review queue + mistakes -> due now */
    J("ReviewQueue", []).forEach(e => { const id = legacyId(e); if (id && phraseOf(id)) s.srs[id] = { box: 0, due: Date.now(), lapses: (s.srs[id] && s.srs[id].lapses) || 0 }; });
    J("Mistakes", []).forEach(e => {
      const id = legacyId(e); if (id && phraseOf(id)) {
        if (!s.mistakes.includes(id)) s.mistakes.push(id);
        if (!s.srs[id]) s.srs[id] = { box: 0, due: Date.now(), lapses: 1 };
      }
    });
    /* seed srs for any completed lesson that has no cards yet */
    s.done.forEach((d, li) => { if (d) lessons[li].phrases.forEach((_, pi) => { const id = pid(li, pi); if (!s.srs[id]) s.srs[id] = { box: 2, due: Date.now() + 3 * DAY, lapses: 0 }; }); });
    /* scalars */
    const days = J("StreakDays", 0); if (typeof days === "number" && days > 0) s.streak.days = days;
    const target = Number(LK("ScoreTarget")); if ([5, 15, 30].includes(target)) s.goalMin = target;
    s.voice.name = LK("SelectedVoice") || "";
    const rate = Number(LK("SpeechRate")); if (rate) s.voice.rate = clamp(rate, 0.6, 1.4);
    const pitch = Number(LK("VoicePitch")); if (pitch) s.voice.pitch = clamp(pitch, 0.7, 1.4);
    const notes = LK("Notes"); if (notes && notes.trim() && notes.trim() !== "[]" && notes.trim() !== "{}") s.legacyNote = notes.trim();
    s.counters.quizzes = Number(LK("QuizWins")) || 0;
    s.counters.shadows = Number(LK("AudioWins")) || 0;
    if (LK("PlacementDone") === "true" || s.done.some(Boolean)) s.seenIntro = true;
    s.lesson = Math.max(0, s.done.findIndex(d => !d) === -1 ? lessons.length - 1 : s.done.findIndex(d => !d));
    localStorage.setItem("hana.migrated", "1");
  } catch (e) { }
  return s;
}
function load() {
  try {
    const raw = localStorage.getItem(KEY);
    if (raw) { const s = JSON.parse(raw); if (s && s.v === 2) return fill(s); }
  } catch (e) { }
  return migrate() || defaultState();
}
let state = load();
function save() { try { localStorage.setItem(KEY, JSON.stringify(state)); } catch (e) { } }

function ensureToday() {
  if (state.today.date !== todayStr()) {
    state.today = { date: todayStr(), review: false, learn: false, speak: false };
    save();
  }
}

/* ---------- SRS ---------- */
function srsDue() { const now = Date.now(); return Object.keys(state.srs).filter(id => state.srs[id].due <= now && phraseOf(id)); }
function grade(id, good) {
  const c = state.srs[id] || { box: 0, due: 0, lapses: 0 };
  if (good) { c.box = Math.min(4, c.box + 1); }
  else { c.box = 0; c.lapses++; addMistake(id); }
  c.due = Date.now() + INTERVALS[c.box] * DAY + (c.box === 0 ? 10 * 60000 : 0); /* again: back in 10 min */
  state.srs[id] = c; save();
}
function seedLesson(li, box, dueDays) {
  lessons[li].phrases.forEach((_, pi) => {
    const id = pid(li, pi);
    if (!state.srs[id]) state.srs[id] = { box: box, due: Date.now() + dueDays * DAY, lapses: 0 };
  });
}
function addMistake(id) {
  state.mistakes = state.mistakes.filter(m => m !== id);
  state.mistakes.unshift(id);
  state.mistakes = state.mistakes.slice(0, 30);
}
function reviewBatch() {
  const n = state.goalMin === 5 ? 4 : state.goalMin === 30 ? 14 : 8;
  const due = srsDue();
  if (due.length) return due.slice(0, n);
  const learned = Object.keys(state.srs).filter(id => phraseOf(id));
  return learned.length ? sample(learned, Math.min(n, learned.length)) : [];
}
function nextLessonIndex() { const i = state.done.findIndex(d => !d); return i; } /* -1 = all done */

/* ---------- streak / day ---------- */
function requiredSteps() {
  const steps = ["learn", "speak"];
  /* review is required only when cards are actually due (or already done);
     the no-due "warm-up" offer stays optional so finishing a lesson never
     moves the day's goalposts retroactively */
  if (srsDue().length || state.today.review) steps.unshift("review");
  return steps;
}
function maybeFinishDay() {
  const req = requiredSteps();
  if (!req.every(k => state.today[k])) return;
  if (state.streak.last === todayStr()) return;
  const st = state.streak;
  if (st.last === yesterStr() || st.last === "") st.days = st.days + 1;
  else st.days = 1;
  st.last = todayStr();
  save(); renderAll();
  toast("Day complete — " + st.days + "-day streak ✦");
}

/* ---------- TTS ---------- */
window.__hanaDebug = /[?&]debug\b/.test(location.search);
  let koVoice = null;
// iOS unlocks speechSynthesis only via a gesture-bound speak(). Changing the
  // voice can re-lock it, so prime with an inaudible utterance inside the gesture.
  let speechPrimed = false;
  function primeSpeech() {
    if (!("speechSynthesis" in window)) return;
    try {
      const u = new SpeechSynthesisUtterance(" ");
      u.volume = 0; u.rate = 2;
      speechSynthesis.speak(u);
      speechPrimed = true;
    } catch (e) {}
  }
  function loadVoices() {
  if (!("speechSynthesis" in window)) return;
  const all = speechSynthesis.getVoices() || [];
  const ko = all.filter(v => /^ko/i.test(v.lang));
  /* default to a known female Korean voice when the person hasn't chosen one */
  const FEMALE = ['yuna', 'sunhi', 'sun-hi', 'heami', 'google \ud55c\uad6d\uc758', 'seoyeon', 'kyuri', 'jihun female'];
  const preferred = ko.find(v => FEMALE.some(f => v.name.toLowerCase().includes(f)));
  koVoice = all.find(v => v.name === state.voice.name) || preferred || ko[0] || null;
  const sel = $("#voiceSel");
  if (sel) {
    const list = ko.length ? ko : all;
    sel.innerHTML = '<option value="">Automatic</option>' + list.map(v => `<option value="${esc(v.name)}" ${v.name === state.voice.name ? "selected" : ""}>${esc(v.name)}</option>`).join("");
  }
}
function voiceHint() {
  if (voiceHint._shown) { toast("No Korean voice found on this device."); return; }
  voiceHint._shown = true;
  const ua = navigator.userAgent || "";
  let how = "Add a Korean voice in your device's speech settings, then try again.";
  if (/iPhone|iPad|iPod/i.test(ua)) how = "iOS: Settings \u203A Accessibility \u203A Spoken Content \u203A Voices \u203A Korean, then return and tap play.";
  else if (/Macintosh|Mac OS X/i.test(ua)) how = "Mac: System Settings \u203A Accessibility \u203A Spoken Content \u203A manage voices \u203A add Korean (Yuna), then tap play.";
  else if (/Android/i.test(ua)) how = "Android: Settings \u203A Accessibility \u203A Text-to-speech \u203A install Korean voice data, then tap play.";
  else if (/Windows/i.test(ua)) how = "Windows: Settings \u203A Time & Language \u203A Speech \u203A add a Korean voice, then tap play.";
  toast("No Korean voice installed \u2014 " + how);
}

function speak(text) {
  if (!("speechSynthesis" in window)) { toast("Speech isn't available in this browser."); return; }
  if (!text) return;

  const fire = () => {
    try {
      // Voices can load late (Chrome/Safari fire 'voiceschanged' after first paint).
      // If we never resolved a Korean voice, try once more right before speaking.
      if (!koVoice) loadVoices();

      // iOS often returns an empty getVoices() list until speech runs once.
      // Treat "empty list" as "unknown" (try anyway) — only show the hint when the
      // list is actually populated but contains no Korean voice. Otherwise the
      // empty-list quirk falsely blocks playback on iPhones that CAN speak Korean.
      const voices = speechSynthesis.getVoices() || [];
      const hasKorean = voices.some(v => /^ko/i.test(v.lang));
      if (voices.length > 0 && !hasKorean) { voiceHint(); return; }

      const u = new SpeechSynthesisUtterance(text);
      u.lang = "ko-KR";
      if (koVoice) { u.voice = koVoice; u.lang = koVoice.lang || "ko-KR"; }
      u.rate = state.voice.rate; u.pitch = state.voice.pitch;

      // A voice that's listed but has no audio data "speaks" instantly and silently.
      // If onend fires far faster than the text could possibly take, surface the hint.
      // (Skip this heuristic on iOS, where onend timing is unreliable for real speech.)
      const isIOS = /iPhone|iPad|iPod/i.test(navigator.userAgent || "") ||
                    (navigator.platform === "MacIntel" && navigator.maxTouchPoints > 1);
      if (!isIOS) {
        const started = Date.now();
        const minMs = Math.max(350, text.length * 90); // rough lower bound for real speech
        u.onend = () => { if (Date.now() - started < minMs) voiceHint(); };
      }
      u.onerror = (ev) => {
        if (ev && (ev.error === "interrupted" || ev.error === "canceled")) return;
        toast("Couldn't play audio on this device.");
      };

      // Chrome can get stuck in a paused state; make sure we're running.
      try { speechSynthesis.resume(); } catch (e) {}
      if (window.__hanaDebug) {
        toast("dbg: voices=" + voices.length + " ko=" + hasKorean +
              " speaking=" + speechSynthesis.speaking + " paused=" + speechSynthesis.paused +
              " primed=" + (typeof speechPrimed!=="undefined"?speechPrimed:"n/a"));
      }
      speechSynthesis.speak(u);
      if (window.__hanaDebug) {
        setTimeout(function(){ toast("dbg after: speaking=" + speechSynthesis.speaking + " pending=" + speechSynthesis.pending); }, 600);
      }
    } catch (e) {
      toast("Couldn't play audio on this device.");
    }
  };

  // iOS Safari requires speak() to run synchronously inside the tap handler —
  // any setTimeout defer breaks the user-gesture chain and the utterance is
  // silently dropped. So on iOS we cancel and speak immediately, in the same tick.
  // Other browsers hit a cancel()+speak() race, so there we defer one tick.
  const isIOS = /iPhone|iPad|iPod/i.test(navigator.userAgent || "") ||
                (navigator.platform === "MacIntel" && navigator.maxTouchPoints > 1);
  try {
    if (isIOS) {
      // iOS: do NOT cancel before speaking — cancel()+speak() in the same tick can
      // leave the engine queued-but-silent. Only cancel if actually mid-utterance.
      if (speechSynthesis.speaking) { try { speechSynthesis.cancel(); } catch (e) {} }
      fire();
    } else if (speechSynthesis.speaking || speechSynthesis.pending) {
      speechSynthesis.cancel();
      setTimeout(fire, 60);
    } else {
      fire();
    }
  } catch (e) {
    fire();
  }
}

}

function statusDot(id) {

/* ----- Today ----- */
function phraseOfDay() {
  const learned = Object.keys(state.srs).filter(id => phraseOf(id));
  const pool = learned.length ? learned : lessons[0].phrases.map((_, i) => pid(0, i));
  let h = 0; const d = todayStr();
  for (let i = 0; i < d.length; i++) h = (h * 31 + d.charCodeAt(i)) >>> 0;
  return pool[h % pool.length];
}
function renderToday() {
  ensureToday();

  const doneCount = state.done.filter(Boolean).length;
  const due = srsDue().length;
  const next = nextLessonIndex();
  const lessonForToday = next === -1 ? null : next;
  const dateLabel = new Date().toLocaleDateString("en-CA", { weekday: "long", month: "long", day: "numeric" });

  const req = requiredSteps();
  const doneN = req.filter(k => state.today[k]).length;
  const ringFrac = req.length ? doneN / req.length : 0;
  const C = 2 * Math.PI * 21;
  const podId = phraseOfDay();
  const pod = phraseOf(podId);
  const bits = [];
  bits.push(state.streak.days > 0 ? state.streak.days + "-day streak" : "day one is the brave one");
  if (due) bits.push(due + " card" + (due > 1 ? "s" : "") + " waiting");
  bits.push(lessonForToday == null ? "all fifteen lessons done" : "lesson " + (lessonForToday + 1) + " ahead");
  bits.push(state.goalMin + "-minute goal");
  let html = `
    <section class="hero-card">
      <span class="hero-jamo j1" aria-hidden="true">ㅎ</span>
      <span class="hero-jamo j2" aria-hidden="true">ㅏ</span>
      <span class="hero-jamo j3" aria-hidden="true">ㄴ</span>
      <div class="hero-main">
        <div class="hero-text">
          <div class="hero-kicker">오늘 · ${esc(dateLabel)}</div>
          <h1>${greeting()}</h1>
          <p class="hero-line">${esc(bits.join(" · "))}</p>
        </div>
        <svg class="dayring" viewBox="0 0 52 52" aria-hidden="true">
          <defs><linearGradient id="ringGrad" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0" stop-color="#10a67a"/><stop offset="1" stop-color="#7ce7b3"/>
          </linearGradient></defs>
          <circle class="track" cx="26" cy="26" r="21"></circle>
          <circle class="arc" cx="26" cy="26" r="21" stroke-dasharray="${C.toFixed(1)}" stroke-dashoffset="${(C * (1 - ringFrac)).toFixed(1)}"></circle>
          <text x="26" y="30" text-anchor="middle">${doneN}/${req.length}</text>
        </svg>

        <span><span class="pod-ko">${esc(pod[0])}</span><span class="pod-en">${esc(pod[1])} · ${esc(pod[2])}</span></span>
        <span class="pod-tag">phrase of the day</span>

    html += `<div class="banner"><span class="big">✦</span><span>Today is done — ${state.streak.days}-day streak. Come back tomorrow, or wander the Path.</span></div>`;
  }

  /* steps */
  const batch = reviewBatch();

    steps.push(step("review", "1", state.today.review, "Warm-up review",
      state.today.review ? "Done — nice." : (srsDue().length ? batch.length + " cards are due" : "A quick refresher of " + batch.length)));
  }
  steps.push(step("learn", String(steps.length + 1), state.today.learn, "Learn",
    state.today.learn ? "Done for today." :
      lessonForToday == null ? "All 15 done — revisit any lesson" : "Lesson " + (lessonForToday + 1) + ": " + lessons[lessonForToday].title));

    state.today.speak ? "Done — your voice counts." : "Shadow one sentence out loud"));

  $$(".step", v).forEach(b => b.addEventListener("click", () => {
    const kind = b.dataset.step;
    if (kind === "review") runReview();

function greeting() {

    <span class="step-go">${done ? "✓" : "→"}</span>

}

/* ----- first-run intro + quick check ----- */
let qc = null;

  if (qc) {
    const q = lessons[qc.qs[qc.i]].quiz;
    return `<div class="card intro" id="introCard">
      <div class="kicker">60-second check</div>
      <div class="qc-progress">Question ${qc.i + 1} of ${qc.qs.length}</div>
      <div class="qc-q">${esc(q.prompt)}</div>

    </div>`;
  }
  return `<div class="card intro" id="introCard">
    <div class="kicker">어서 오세요 — welcome</div>
    <h2>A quiet home for your Korean practice.</h2>
    <p>One small loop, most days: review a little, learn a little, say one thing out loud. Where should we begin?</p>
    <div class="btn-row">
      <button class="btn" id="introZero">I'm new to Hangul</button>
      <button class="btn ghost" id="introCheck">I can read a little</button>
    </div>
  </div>`;
}
function bindIntro(v) {
  const zero = $("#introZero", v), check = $("#introCheck", v);
  if (zero) zero.addEventListener("click", () => { state.seenIntro = true; save(); renderAll(); runLesson(0, true); });
  if (check) check.addEventListener("click", () => { qc = { qs: [0, 1, 2], i: 0, score: 0 }; renderToday(); });
  $$('[data-qc]', v).forEach(b => b.addEventListener("click", () => {
    const q = lessons[qc.qs[qc.i]].quiz;
    if (b.dataset.qc === q.answer) { qc.score++; b.classList.add("good"); }
    else b.classList.add("bad");
    setTimeout(() => {
      qc.i++;
      if (qc.i >= qc.qs.length) {
        state.seenIntro = true;
        if (qc.score >= 2) {
          state.done[0] = state.done[1] = true;
          seedLesson(0, 2, 3); seedLesson(1, 2, 3);
          state.lesson = 2; save();
          toast("Nice — starting you at lesson 3.");
        } else {
          save(); toast("We'll start from the very beginning — a good place to be.");
        }
        qc = null; renderAll();
      } else renderToday();
    }, 550);
  }));
}

        <span class="lsn-state">${done ? "done" : cur ? "next" : ""}</span>
      </button>`;
    }).join("") + `</div>`;
  $$(".lsn", v).forEach(b => b.addEventListener("click", () => runLesson(+b.dataset.lsn, false)));
}

/* ----- Library ----- */
let libTab = "all", libQ = "";
function renderLibrary() {
  const v = $("#view-library");
  v.innerHTML = `
    <div class="kicker">Library</div>
    <div class="lib-bar">
      <input class="search" id="libSearch" type="search" placeholder="Search phrases…" value="${esc(libQ)}" aria-label="Search phrases">
      <div class="seg" role="tablist" aria-label="Library filter">
        <button role="tab" data-lib="all" aria-selected="${libTab === "all"}">All</button>
        <button role="tab" data-lib="mistakes" aria-selected="${libTab === "mistakes"}">Mistakes</button>
        <button role="tab" data-lib="notes" aria-selected="${libTab === "notes"}">Notes</button>
      </div>
    </div>
    <div id="libBody"></div>`;
  $("#libSearch", v).addEventListener("input", e => { libQ = e.target.value; renderLibBody(); });
  $$('[data-lib]', v).forEach(b => b.addEventListener("click", () => { libTab = b.dataset.lib; renderLibrary(); }));
  renderLibBody();
}
function phraseRow(li, piIdx) {
  const id = pid(li, piIdx), ph = lessons[li].phrases[piIdx];
  const hasNote = state.notes[id] ? "✎" : "";
  return `<button class="ph" data-ph="${id}">
    <span class="ph-dot ${statusDot(id)}"></span>
    <span><span class="ph-ko">${esc(ph[0])}</span><span class="ph-en" style="display:block">${esc(ph[1])} · ${esc(ph[2])}</span></span>
    <span class="ph-note-flag">${hasNote}</span>
    <span class="speak" data-say="${esc(ph[0])}" role="button" aria-label="Listen">▶</span>
  </button>`;
}
function matches(li, piIdx) {
  if (!libQ.trim()) return true;
  const q = libQ.trim().toLowerCase();
  return lessons[li].phrases[piIdx].some(t => String(t).toLowerCase().includes(q)) || lessons[li].title.toLowerCase().includes(q);
}
function renderLibBody() {
  const b = $("#libBody"); let html = "";
  if (libTab === "all") {
    lessons.forEach((l, li) => {
      const rows = l.phrases.map((_, piIdx) => matches(li, piIdx) ? phraseRow(li, piIdx) : "").join("");
      if (rows) html += `<div class="lib-group">${pad(li + 1)} — ${esc(l.title)}</div>` + rows;
    });
    if (!html) html = `<div class="empty">Nothing matches “${esc(libQ)}”.</div>`;
  } else if (libTab === "mistakes") {
    const rows = state.mistakes.filter(id => phraseOf(id)).map(id => { const [l, p] = id.split("-").map(Number); return matches(l, p) ? phraseRow(l, p) : ""; }).join("");
    html = rows || `<div class="empty">No mistakes logged — or you've cleared them all. 잘했어요!</div>`;
  } else {
    const ids = Object.keys(state.notes).filter(id => state.notes[id] && phraseOf(id));
    html = ids.map(id => {
      const ph = phraseOf(id);
      return `<div class="note-entry"><span class="ph-ko">${esc(ph[0])}</span><p>${esc(state.notes[id])}</p></div>`;
    }).join("");
    if (state.legacyNote) html += `<div class="note-entry"><span class="ph-ko">Imported note</span><p>${esc(state.legacyNote)}</p></div>`;
    if (!html) html = `<div class="empty">No notes yet — add one from any phrase.</div>`;
  }
  b.innerHTML = html;
  $$(".ph", b).forEach(r => r.addEventListener("click", e => {
    if (e.target.closest("[data-say]")) return;
    openPhraseSheet(r.dataset.ph);
  }));
  $$("[data-say]", b).forEach(s => s.addEventListener("click", e => { e.stopPropagation(); speak(s.dataset.say); }));
}
function openPhraseSheet(id) {
  const ph = phraseOf(id); if (!ph) return;
  const [li] = id.split("-").map(Number);
  const c = state.srs[id];
  const status = !c ? "not learned yet" : c.box >= 3 ? "settled — box " + (c.box + 1) : c.box >= 1 ? "warming up — box " + (c.box + 1) : "fresh — reviewing soon";
  openSheet(lessons[li].title, `
    <div class="bigko">${esc(ph[0])}<small>${esc(ph[1])} — ${esc(ph[2])}</small></div>
    <p class="center muted" style="font-size:0.78rem;margin-bottom:0.9rem;">${esc(status)}${c && c.lapses ? " · " + c.lapses + " stumble" + (c.lapses > 1 ? "s" : "") : ""}</p>
    <div class="runner-foot" style="margin-bottom:1rem;"><button class="btn" id="phSay">▶ Listen</button></div>
    <label style="font-weight:800;font-size:0.78rem;display:block;margin-bottom:0.4rem;">Your note</label>
    <textarea class="notearea" id="phNote" placeholder="A hook, a memory, a warning to future you…">${esc(state.notes[id] || "")}</textarea>
  `);
  $("#phSay").addEventListener("click", () => speak(ph[0]));
  $("#phNote").addEventListener("input", e => {
    const vAl = e.target.value.trim();
    if (vAl) state.notes[id] = vAl; else delete state.notes[id];
    save();
  });
}

/* ---------- runners ---------- */
function progressHtml() { return `<div class="progressline"><i id="runProg"></i></div>`; }
function setProg(f) { const p = $("#runProg"); if (p) p.style.width = Math.round(f * 100) + "%"; }

/* review runner */
function runReview() {
  const cards = reviewBatch();
  if (!cards.length) { state.today.review = true; save(); renderAll(); maybeFinishDay(); return; }
  let i = 0;
  const draw = () => {
    const id = cards[i], ph = phraseOf(id);
    $("#sheetBody").innerHTML = progressHtml() + `
      <div class="bigko">${esc(ph[0])}</div>
      <div class="reveal-zone" id="rev"></div>
      <div class="runner-foot" id="revBtns">
        <button class="btn ghost" id="revSay">▶ Listen</button>
        <button class="btn" id="revShow">Show answer</button>
      </div>`;
    setProg(i / cards.length);
    $("#revSay").addEventListener("click", () => speak(ph[0]));
    $("#revShow").addEventListener("click", () => {
      $("#rev").innerHTML = `<div class="roman">${esc(ph[1])}</div><div class="meaning">${esc(ph[2])}</div>`;
      $("#revBtns").innerHTML = `
        <button class="btn rose" id="revAgain">Again</button>
        <button class="btn" id="revGood">Got it</button>`;
      $("#revAgain").addEventListener("click", () => { grade(id, false); next(); });
      $("#revGood").addEventListener("click", () => { grade(id, true); state.counters.reviews++; next(); });
    });
  };
  const next = () => {
    i++;
    if (i >= cards.length) {
      state.today.review = true; save();
      $("#sheetBody").innerHTML = `<div class="center" style="padding:1.5rem 0;">
        <div style="font-size:2rem;">✦</div>
        <h3 style="margin:0.5rem 0;">Review done</h3>
        <p class="muted" style="font-size:0.8rem;">${cards.length} cards. The boxes do the remembering.</p>
        <div class="runner-foot" style="margin-top:1rem;"><button class="btn" id="revClose">Continue</button></div></div>`;
      $("#revClose").addEventListener("click", () => { closeSheet(); maybeFinishDay(); });
      return;
    }
    draw();
  };
  openSheet("Warm-up review", "");
  draw();
}

/* lesson runner: intro → phrases → quiz → build → shadow → done */
function runLesson(li, fromToday) {
  const L = lessons[li];
  const stages = ["intro", "phrases", "quiz", "build", "shadow", "done"];
  let si = 0;
  let mic = null;
  const stopMic = () => { if (mic) { try { mic.stop(); } catch (e) { } mic = null; } };

  const draw = () => {
    const stage = stages[si];
    setTimeout(() => setProg(si / (stages.length - 1)), 0);
    if (stage === "intro") body(`
      <div class="center" style="padding:0.6rem 0 0.2rem;">
        <span class="tagchip t-${esc(L.tag)}">${esc(L.tag)}</span>
        <h3 style="font-size:1.5rem;font-weight:600;margin:0.6rem 0 0.35rem;">${esc(L.title)}</h3>
        <p class="muted" style="font-size:0.84rem;max-width:38ch;margin:0 auto;">${esc(L.focus)}</p>
      </div>
      <div class="runner-foot" style="margin-top:1.2rem;"><button class="btn" data-next>Begin</button></div>`);
    else if (stage === "phrases") body(
      L.phrases.map((p, piIdx) => `
        <div class="phrase-line">
          <span><span class="ko">${esc(p[0])}</span><span class="en" style="display:block">${esc(p[1])} · ${esc(p[2])}</span></span>
          <button class="notebtn" data-note="${pid(li, piIdx)}" aria-label="Add note">✎</button>
          <button class="speak" data-say="${esc(p[0])}" aria-label="Listen">▶</button>
        </div>`).join("") +
      `<div class="runner-foot" style="margin-top:0.8rem;"><button class="btn" data-next>I've listened — quiz me</button></div>`);
    else if (stage === "quiz") body(`
      <div class="qc-q" style="margin-top:0.2rem;">${esc(L.quiz.prompt)}</div>
      <div class="quiz-opts">${L.quiz.options.map(o => `<button data-opt="${esc(o)}">${esc(o)}</button>`).join("")}</div>
      <div class="runner-foot"><button class="btn" data-next disabled id="quizNext">Continue</button></div>`);
    else if (stage === "build") {
      const order = sample(L.build, L.build.length);
      body(`
        <p class="muted center" style="font-size:0.8rem;margin-bottom:0.7rem;">Tap the words into order:</p>
        <div class="build-line" id="bLine" aria-live="polite"></div>
        <div class="build-pool" id="bPool">${order.map(w => `<button class="chip-ko" data-w="${esc(w)}">${esc(w)}</button>`).join("")}</div>
        <div class="runner-foot">
          <button class="btn ghost" id="bHear">▶ Hear it</button>
          <button class="btn" id="bCheck">Check</button>
        </div>`);
      const line = $("#bLine"), pool = $("#bPool");
      const move = btn => { (btn.parentElement === pool ? line : pool).appendChild(btn); };
      $$(".chip-ko").forEach(c => c.addEventListener("click", () => move(c)));
      $("#bHear").addEventListener("click", () => speak(L.sentence));
      $("#bCheck").addEventListener("click", () => {
        const got = $$(".chip-ko", line).map(c => c.dataset.w).join(" ");
        if (got === L.build.join(" ")) { line.classList.add("ok"); speak(L.sentence); setTimeout(nextStage, 750); }
        else { line.classList.remove("no"); void line.offsetWidth; line.classList.add("no"); toast("Not quite — try again."); }
      });
    }
    else if (stage === "shadow") {
      body(`
        <div class="bigko">${esc(L.sentence)}</div>
        <button class="playbig" id="shPlay" aria-label="Play sentence">▶</button>
        <div class="micbars" id="micBars" aria-hidden="true">${"<i></i>".repeat(9)}</div>
        <p class="muted center" style="font-size:0.74rem;margin-bottom:0.9rem;">Play it, then say it out loud — twice is better.</p>
        <div class="runner-foot">
          <button class="btn ghost small" id="micBtn">Show my voice level</button>
          <button class="btn" data-next>I said it ✓</button>
        </div>`);
      $("#shPlay").addEventListener("click", () => speak(L.sentence));
      $("#micBtn").addEventListener("click", async () => {
        if (mic) return;
        try {
          const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
          const ctx = new (window.AudioContext || window.webkitAudioContext)();
          const src = ctx.createMediaStreamSource(stream);
          const an = ctx.createAnalyser(); an.fftSize = 64;
          src.connect(an);
          const bars = $$("#micBars i"); const data = new Uint8Array(an.frequencyBinCount);
          let raf;
          const loop = () => { an.getByteFrequencyData(data); bars.forEach((b2, k) => { b2.style.height = Math.max(6, (data[k * 3] || 0) / 255 * 38) + "px"; }); raf = requestAnimationFrame(loop); };
          loop();
          mic = { stop() { cancelAnimationFrame(raf); stream.getTracks().forEach(t => t.stop()); ctx.close(); } };
          $("#micBtn").textContent = "Listening…";
          $("#micBtn").disabled = true;
        } catch (e) { toast("Mic not available — your ears still work."); }
      });
    }
    else { /* done */
      stopMic();
      const wasNew = !state.done[li];
      state.done[li] = true;
      seedLesson(li, 1, 1);
      const ni = nextLessonIndex(); state.lesson = ni === -1 ? lessons.length - 1 : ni;
      if (fromToday) { state.today.learn = true; }
      state.counters.quizzes++;
      save();
      body(`<div class="center" style="padding:1.2rem 0;">
        <div style="font-size:2.2rem;">한</div>
        <h3 style="margin:0.5rem 0;">${wasNew ? "Lesson " + (li + 1) + " done" : "Nice revisit"}</h3>
        <p class="muted" style="font-size:0.8rem;max-width:36ch;margin:0 auto;">${wasNew ? "Its phrases just joined your review boxes — they'll resurface tomorrow." : "Repetition is the whole secret."}</p>
        <div class="runner-foot" style="margin-top:1.1rem;"><button class="btn" id="lsnClose">Continue</button></div></div>`);
      $("#lsnClose").addEventListener("click", () => { closeSheet(); maybeFinishDay(); });
      return;
    }
  };
  const body = html => {
    $("#sheetBody").innerHTML = progressHtml() + html;
    $$("[data-say]", $("#sheetBody")).forEach(s => s.addEventListener("click", () => speak(s.dataset.say)));
    $$("[data-note]", $("#sheetBody")).forEach(n => n.addEventListener("click", () => openPhraseSheetInline(n.dataset.note)));
    const nxt = $("[data-next]", $("#sheetBody"));
    if (nxt) nxt.addEventListener("click", nextStage);
    $$("[data-opt]", $("#sheetBody")).forEach(o => o.addEventListener("click", () => {
      if (o.dataset.opt === L.quiz.answer) {
        o.classList.add("good"); $("#quizNext").disabled = false;
        $$("[data-opt]").forEach(x => x.disabled = true);
      } else {
        o.classList.add("bad");
        const piIdx = L.phrases.findIndex(p => p[0] === L.quiz.answer);
        if (piIdx >= 0) { addMistake(pid(li, piIdx)); grade(pid(li, piIdx), false); }
      }
    }));
  };
  const nextStage = () => { si++; draw(); };
  function openPhraseSheetInline(id) { /* quick note without leaving the lesson */
    const ph = phraseOf(id);
    const cur = state.notes[id] || "";
    const note = prompt("Note for “" + ph[0] + "”", cur);
    if (note !== null) { if (note.trim()) state.notes[id] = note.trim(); else delete state.notes[id]; save(); toast("Noted."); }
  }
  openSheet("Lesson " + (li + 1), "", stopMic);
  draw();
}

/* speak step (today) */
function runSpeak() {
  let li = nextLessonIndex();
  if (li === -1 || li === 0 && !state.done[0]) li = Math.max(0, li);
  const learnedIdx = state.done.map((d, i) => d ? i : -1).filter(i => i >= 0);
  const pick = state.today.learn && learnedIdx.length ? learnedIdx[learnedIdx.length - 1] : (li === -1 ? learnedIdx[Math.floor(Math.random() * learnedIdx.length)] || 0 : li);
  const L = lessons[pick];
  openSheet("Speak", `
    <div class="bigko">${esc(L.sentence)}<small>${esc(L.title)}</small></div>
    <button class="playbig" id="spPlay" aria-label="Play sentence">▶</button>
    <p class="muted center" style="font-size:0.76rem;margin-bottom:1rem;">Out loud. The wall doesn't judge.</p>
    <div class="runner-foot"><button class="btn" id="spDone">I said it ✓</button></div>`);
  $("#spPlay").addEventListener("click", () => speak(L.sentence));
  $("#spDone").addEventListener("click", () => {
    state.today.speak = true; state.counters.shadows++; save();
    closeSheet(); maybeFinishDay();
  });
}

/* ---------- settings ---------- */
function openSettings() {
  openSheet("Settings", `
    <div class="set-row">
      <label>Daily goal<span class="hint">sizes your review batch</span></label>
      <div class="seg">${[5, 15, 30].map(g => `<button data-goal="${g}" aria-selected="${state.goalMin === g}">${g} min</button>`).join("")}</div>
    </div>
    <div class="set-row">
      <label>Voice<span class="hint">Korean voices on this device</span></label>
      <select id="voiceSel"></select>
    </div>
    <div class="set-row">
      <label>Speed<span class="hint" id="rateVal">${state.voice.rate.toFixed(2)}×</span></label>
      <input type="range" id="rateRange" min="0.6" max="1.3" step="0.05" value="${state.voice.rate}">
    </div>
    <div class="set-row">
      <label>Pitch<span class="hint" id="pitchVal">${state.voice.pitch.toFixed(2)}</span></label>
      <input type="range" id="pitchRange" min="0.7" max="1.3" step="0.05" value="${state.voice.pitch}">
    </div>
    <div class="set-row"><label>Try it</label><button class="btn small" id="voiceTest">▶ 안녕하세요</button></div>
    <div class="set-row">
      <label>Your data<span class="hint">everything lives in this browser</span></label>
      <span class="btn-row">
        <button class="btn ghost small" id="expBtn">Export</button>
        <button class="btn ghost small" id="impBtn">Import</button>
        <button class="btn rose small" id="rstBtn">Reset</button>
      </span>
    </div>
    <input type="file" id="impFile" accept="application/json" hidden>
    <p class="muted" style="font-size:0.68rem;margin-top:0.9rem;line-height:1.6;">Method: little and often — listen, speak, review. Hana v2 · offline-ready · a personal tool by Jack Mao.</p>
  `);
  loadVoices();
  $$("[data-goal]").forEach(b => b.addEventListener("click", () => { state.goalMin = +b.dataset.goal; save(); openSettings(); }));
  $("#voiceSel").addEventListener("change", e => { state.voice.name = e.target.value; save(); loadVoices(); primeSpeech(); });
  $("#rateRange").addEventListener("input", e => { state.voice.rate = +e.target.value; $("#rateVal").textContent = state.voice.rate.toFixed(2) + "×"; save(); });
  $("#pitchRange").addEventListener("input", e => { state.voice.pitch = +e.target.value; $("#pitchVal").textContent = state.voice.pitch.toFixed(2); save(); });
  $("#voiceTest").addEventListener("click", () => speak("안녕하세요"));
  $("#expBtn").addEventListener("click", () => {
    try {
      const blob = new Blob([JSON.stringify(state, null, 2)], { type: "application/json" });
      const a = document.createElement("a"); a.href = URL.createObjectURL(blob);
      a.download = "hana-practice.json"; a.click(); URL.revokeObjectURL(a.href);
    } catch (e) { toast("Export failed."); }
  });
  $("#impBtn").addEventListener("click", () => $("#impFile").click());
  $("#impFile").addEventListener("change", e => {
    const f = e.target.files[0]; if (!f) return;
    const r = new FileReader();
    r.onload = () => {
      try {
        const s = JSON.parse(r.result);
        if (s && s.v === 2) { state = fill(s); save(); closeSheet(); renderAll(); toast("Practice restored."); }
        else toast("That doesn't look like a Hana file.");
      } catch (err) { toast("Couldn't read that file."); }
    };
    r.readAsText(f);
  });
  $("#rstBtn").addEventListener("click", () => {
    if (confirm("Reset all Hana progress on this device?")) {
      try { localStorage.removeItem(KEY); } catch (e) { }
      state = defaultState(); save(); closeSheet(); renderAll(); toast("Fresh start.");
    }
  });
}

/* ---------- boot ---------- */
function renderAll() { renderTop(); renderToday(); renderPath(); renderLibrary(); }

$$('[data-view]').forEach(b => b.addEventListener("click", () => setView(b.dataset.view)));
$("#gearBtn").addEventListener("click", openSettings);
$("#sheetClose").addEventListener("click", closeSheet);
$("#sheetBackdrop").addEventListener("click", closeSheet);
document.addEventListener("keydown", e => { if (e.key === "Escape" && $("#sheet").classList.contains("open")) closeSheet(); });

if ("speechSynthesis" in window) {
  loadVoices();
  speechSynthesis.addEventListener("voiceschanged", loadVoices);
}
ensureToday();
renderAll();

if ("serviceWorker" in navigator) {
  window.addEventListener("load", () => { navigator.serviceWorker.register("./sw.js").catch(() => { }); });
}

  
  // One-time speech unlock on the very first user gesture (iOS safety net).
  (function(){
    function unlock(){ primeSpeech(); document.removeEventListener("pointerdown", unlock); document.removeEventListener("touchstart", unlock); }
    document.addEventListener("pointerdown", unlock, { once:false, passive:true });
    document.addEventListener("touchstart", unlock, { once:false, passive:true });
  })();
</script>
