    /* ── Page transition — scale exit ── */
    #page-veil {
      position: fixed;
      inset: 0;
      z-index: 100000;
      background: var(--veil-color, var(--navy, #0f0e1a));
      opacity: 1;
      pointer-events: auto;
      transition: opacity .42s cubic-bezier(.16,1,.3,1);
    }
    .page-ready #page-veil {
      opacity: 0;
      pointer-events: none;
    }
    /* Scale-down exit on the main content wrapper */
    body {
      transition: transform .38s cubic-bezier(.4,0,1,1),
                  opacity   .38s cubic-bezier(.4,0,1,1);
    }
    .page-leaving body,
    html.page-leaving body {
      transform: scale(0.97);
      opacity: 0.4;
    }
    @media (prefers-reduced-motion: reduce) {
      #page-veil { transition: none; }
      body        { transition: none; }
    }

    /* ── View Transitions API ── */
    @view-transition { navigation: auto; }
    @media (prefers-reduced-motion: no-preference) {
      ::view-transition-old(root) {
        animation: vt-out 0.28s cubic-bezier(0.4, 0, 1, 1) both;
      }
      ::view-transition-new(root) {
        animation: vt-in  0.32s cubic-bezier(0.16, 1, 0.3, 1) both;
      }
    }
    @keyframes vt-out {
      from { opacity: 1;   transform: scale(1);    }
      to   { opacity: 0;   transform: scale(0.97); }
    }
    @keyframes vt-in {
      from { opacity: 0;   transform: scale(1.01); }
      to   { opacity: 1;   transform: scale(1);    }
    }
    @media (prefers-reduced-motion: reduce) {
      ::view-transition-old(root),
      ::view-transition-new(root) { animation: none; }
    }

  <script>
    if ('scrollRestoration' in history) history.scrollRestoration = 'manual';

    const cur = document.getElementById('cursor');
    cur.style.left = '-100px'; cur.style.top = '-100px';
    document.addEventListener('mousemove', e => {
      cur.style.left = e.clientX + 'px';
      cur.style.top  = e.clientY + 'px';
    });
    document.querySelectorAll('a').forEach(el => {
      el.addEventListener('mouseenter', () => cur.style.width = cur.style.height = '36px');
      el.addEventListener('mouseleave', () => cur.style.width = cur.style.height = '14px');
    });
  
    // -- Haptic-style tap feedback --
    (function() {
      const targets = document.querySelectorAll('nav a, nav button, .mobile-tabbar a, .mobile-tabbar button, .mobile-action-menu a');
      if (!targets.length) return;
      const reduceMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
      const coarsePointer = window.matchMedia('(pointer: coarse)').matches;
      const canVibrate = coarsePointer && 'vibrate' in navigator;
      const timers = new WeakMap();
      const release = el => {
        const timer = timers.get(el);
        if (timer) window.clearTimeout(timer);
        el.classList.remove('haptic-press');
      };
      targets.forEach(el => {
        el.classList.add('haptic-target');
        el.addEventListener('pointerdown', event => {
          if (event.pointerType === 'mouse') return;
          if (canVibrate) {
            try { navigator.vibrate(8); } catch (error) {}
          }
          if (!reduceMotion) {
            el.classList.add('haptic-press');
            timers.set(el, window.setTimeout(() => release(el), 160));
          }
        }, { passive: true });
        ['pointerup', 'pointercancel', 'pointerleave', 'blur'].forEach(type => {
          el.addEventListener(type, () => release(el), { passive: true });
        });
      });
    })();
  
    // ── Page transition ──
    (function() {
      const root = document.documentElement;
      const veil = document.getElementById('page-veil');
      const rm   = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
      const supportsVT = 'startViewTransition' in document;

      // Page reveal on load
      const ready = () => {
        root.classList.remove('page-leaving');
        root.classList.add('page-ready');
      };
      if (veil && !rm && !supportsVT) {
        requestAnimationFrame(() => requestAnimationFrame(ready));
      } else {
        ready();
      }

      // bfcache restore
      window.addEventListener('pageshow', e => {
        if (e.persisted) {
          if (veil) { veil.style.opacity = '0'; veil.style.pointerEvents = 'none'; }
          root.classList.remove('page-leaving');
          root.classList.add('page-ready');
        }
      });

      // Navigation
      document.addEventListener('click', e => {
        const link = e.target.closest('a[href]');
        if (!link || e.defaultPrevented || e.metaKey || e.ctrlKey || e.shiftKey || e.altKey) return;
        if (link.target === '_blank' || link.hasAttribute('download')) return;
        const href = link.getAttribute('href');
        if (!href || href.startsWith('mailto:') || href.startsWith('tel:') || href.startsWith('#')) return;
        let url;
        try { url = new URL(href, window.location.href); } catch { return; }
        if (url.origin !== window.location.origin) return;
        if (url.pathname === window.location.pathname && !url.hash) return;

        e.preventDefault();

        if (supportsVT && !rm) {
          // Native View Transition — browser handles the crossfade
          document.startViewTransition(() => {
            window.location.href = url.href;
          });
        } else if (veil && !rm) {
          // Fallback: veil + scale exit
          root.classList.remove('page-ready');
          root.classList.add('page-leaving');
          setTimeout(() => { window.location.href = url.href; }, 320);
        } else {
          // Instant (reduced motion)
          window.location.href = url.href;
        }
      });
    })();
  </script>
