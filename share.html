  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    * { -webkit-tap-highlight-color: transparent; }
    html { scroll-behavior: smooth; overflow-x: hidden; }

    :root {
      --ease-out: cubic-bezier(0.16, 1, 0.3, 1);
      --ease-in:  cubic-bezier(0.4, 0, 1, 1);
      --ease-io:  cubic-bezier(0.4, 0, 0.2, 1);
      --navy:         #0f0e1a;
      --navy2:        #16152b;
      --purple:       #7B6CF6;
      --purple-light: #a99cf8;
      --lime:         #ccff00;
      --white:        #ffffff;
      --cream:        #f5f0e8;
      --muted:        rgba(255,255,255,0.35);
    }

    body {
      font-family: 'Syne', sans-serif;
      background: var(--navy);
      color: var(--white);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      -webkit-text-size-adjust: 100%; text-size-adjust: 100%;
    }

    /* Cursor */
    .cursor {
      position: fixed; left: -100px; top: -100px;
      width: 14px; height: 14px;
      background: var(--lime);
      border-radius: 50%;
      pointer-events: none;
      z-index: 9999;
      transform: translate(-50%,-50%);
      transition: width .2s, height .2s;
      mix-blend-mode: difference;
      will-change: left, top;
    }

    /* Background glow */
    .bg-glow {
      position: fixed; inset: 0; z-index: 0; pointer-events: none;
      background:
        radial-gradient(ellipse 55% 55% at 25% 55%, rgba(123,108,246,0.18) 0%, transparent 70%),
        radial-gradient(ellipse 40% 40% at 75% 35%, rgba(204,255,0,0.06) 0%, transparent 65%);
    }

    /* Page veil */
    #page-veil {
      position: fixed; inset: 0; z-index: 100000;
      background: var(--navy);
      opacity: 1; pointer-events: auto;
      transition: opacity .42s cubic-bezier(.16,1,.3,1);
    }
    .page-ready #page-veil { opacity: 0; pointer-events: none; }

    /* VT */
    @view-transition { navigation: auto; }
    @media (prefers-reduced-motion: no-preference) {
      ::view-transition-old(root) { animation: vt-out .28s cubic-bezier(.4,0,1,1) both; }
      ::view-transition-new(root) { animation: vt-in  .32s cubic-bezier(.16,1,.3,1) both; }
    }
    @keyframes vt-out { from{opacity:1;transform:scale(1)} to{opacity:0;transform:scale(.97)} }
    @keyframes vt-in  { from{opacity:0;transform:scale(1.01)} to{opacity:1;transform:scale(1)} }
    @media (prefers-reduced-motion: reduce) {
      ::view-transition-old(root), ::view-transition-new(root) { animation: none; }
    }

    /* Print */

    /* Fallback exit animation */
    body {
      transition: transform .38s cubic-bezier(.4,0,1,1),
                  opacity   .38s cubic-bezier(.4,0,1,1);
    }
    .page-leaving body { transform: scale(0.97); opacity: 0.4; }
    @media (prefers-reduced-motion: reduce) {
      body { transition: none; }
    }

    /* ── Social QR grid ── */
    .connect-qr-grid {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1rem;
      width: 100%;
      max-width: 480px;
    }
    .connect-qr-row {
      display: flex;
      justify-content: center;
      gap: 1rem;
      width: 100%;
    }
    .connect-qr-card {
      background: var(--cream);
      border-radius: 16px;
      padding: .85rem .85rem .7rem;
      box-shadow: 0 12px 32px rgba(0,0,0,.45), 0 0 0 1px rgba(255,255,255,.06);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: .45rem;
      flex: 1;
      max-width: 180px;
      min-width: 120px;
      text-decoration: none;
      transition: transform .2s, box-shadow .2s;
    }
    .connect-qr-card:hover {
      transform: translateY(-3px);
      box-shadow: 0 18px 48px rgba(0,0,0,.55), 0 0 0 1px rgba(255,255,255,.1);
    }
    .connect-qr-card svg {
      width: 100%; height: auto; display: block;
    }
    .connect-qr-platform {
      font-family: 'DM Mono', monospace;
      font-size: .6rem;
      font-weight: 500;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: rgba(15,14,26,0.55);
      text-align: center;
    }
    .connect-qr-handle {
      font-family: 'DM Mono', monospace;
      font-size: .55rem;
      letter-spacing: .06em;
      color: rgba(15,14,26,0.35);
      text-align: center;
    }

    /* Scan-to-visit as link */
    .qr-scan-link {
      font-family: 'Syne', sans-serif;
      font-size: .72rem;
      font-weight: 700;
      letter-spacing: .08em;
      text-transform: uppercase;
      color: var(--purple);
      text-align: center;
      text-decoration: none;
      transition: opacity .2s;
      display: block;
      width: 100%;
    }
    .qr-scan-link:hover { opacity: .7; }

    /* Social section divider */
    .connect-divider {
      display: flex;
      align-items: center;
      gap: .75rem;
      width: 100%;
      max-width: 320px;
    }
    .connect-divider::before,
    .connect-divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: rgba(255,255,255,.1);
    }
    .connect-divider-text {
      font-family: 'DM Mono', monospace;
      font-size: .55rem;
      letter-spacing: .15em;
      text-transform: uppercase;
      color: rgba(255,255,255,.2);
      white-space: nowrap;
    }

    @media (max-width: 400px) {
      .connect-qr-card { padding: .65rem .65rem .55rem; max-width: 150px; }
    }

    @media print {
      body { background: #fff !important; color: #000 !important; }
      .cursor, #page-veil, .bg-glow, .back-link { display: none !important; }
      .qr-card { box-shadow: none !important; border: 1px solid #ddd !important; }
    }

    /* Layout */
    .wrap {
      position: relative; z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2.5rem;
      max-width: 480px;
      width: 100%;
      text-align: center;
    }

    /* Header */
    .share-header { display: flex; flex-direction: column; gap: .4rem; }

    .share-label {
      font-family: 'DM Mono', monospace;
      font-size: .6rem;
      letter-spacing: .22em;
      text-transform: uppercase;
      color: var(--lime);
    }

    .share-name {
      font-size: clamp(2rem, 6vw, 3rem);
      font-weight: 800;
      letter-spacing: -.03em;
      line-height: 1.05;
    }

    .share-name em {
      font-family: 'DM Serif Display', serif;
      font-style: italic;
      color: var(--purple-light);
    }

    .share-role {
      font-family: 'DM Mono', monospace;
      font-size: .7rem;
      letter-spacing: .1em;
      color: var(--muted);
      margin-top: .25rem;
    }

    /* QR card */
    .qr-card {
      background: var(--cream);
      border-radius: 24px;
      padding: 1.75rem;
      box-shadow: 0 24px 64px rgba(0,0,0,.5), 0 0 0 1px rgba(255,255,255,.06);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1rem;
      width: 100%;
      max-width: 300px;
    }

    .qr-svg-wrap {
      width: 100%;
      color: var(--navy);
      line-height: 0;
    }

    .qr-svg-wrap svg {
      width: 100%;
      height: auto;
      display: block;
    }

    .qr-url {
      font-family: 'DM Mono', monospace;
      font-size: .65rem;
      letter-spacing: .08em;
      color: rgba(15,14,26,0.5);
      text-decoration: none;
    }

    /* Copy button */
    .copy-btn {
      display: inline-flex;
      align-items: center;
      gap: .45rem;
      padding: .55rem 1.4rem;
      border-radius: 100px;
      border: 1px solid rgba(255,255,255,.12);
      background: rgba(255,255,255,.04);
      color: rgba(255,255,255,.55);
      font-family: 'DM Mono', monospace;
      font-size: .65rem;
      letter-spacing: .1em;
      text-transform: uppercase;
      cursor: auto;
      transition: border-color .2s, color .2s, background .2s;
    }
    .copy-btn:hover {
      border-color: rgba(255,255,255,.25);
      color: var(--white);
      background: rgba(255,255,255,.07);
    }
    .copy-btn.copied {
      border-color: rgba(204,255,0,.35);
      color: var(--lime);
      background: rgba(204,255,0,.06);
    }

    /* Back link */
    .back-link {
      font-family: 'DM Mono', monospace;
      font-size: .6rem;
      letter-spacing: .14em;
      text-transform: uppercase;
      color: rgba(255,255,255,.25);
      text-decoration: none;
      transition: color .2s;
    }
    .back-link:hover { color: rgba(255,255,255,.55); }

    /* Focus */
    :focus-visible { outline: 2px solid var(--lime); outline-offset: 3px; border-radius: 4px; }
    :focus:not(:focus-visible) { outline: none; }

    @media (pointer: fine) {
      body { cursor: auto; }
      a, button { cursor: auto; }
    }
    @media (max-width: 400px) {
      .wrap { gap: 2rem; }
      .qr-card { padding: 1.25rem; }
    }
  </style>
</head>

  <script>
    if ('scrollRestoration' in history) history.scrollRestoration = 'manual';

    // Cursor
    const cur = document.getElementById('cursor');
    if (cur) {
      document.addEventListener('mousemove', e => {
        cur.style.left = e.clientX + 'px';
        cur.style.top  = e.clientY + 'px';
      });
      document.querySelectorAll('a, button').forEach(el => {
        el.addEventListener('mouseenter', () => { cur.style.width = cur.style.height = '32px'; });
        el.addEventListener('mouseleave', () => { cur.style.width = cur.style.height = '14px'; });
      });
    }

    // Copy link
    const copyBtn = document.getElementById('copyBtn');
    if (copyBtn) {
      copyBtn.addEventListener('click', async () => {
        try {
          await navigator.clipboard.writeText('https://hellojackmao.com');
          copyBtn.classList.add('copied');
          copyBtn.querySelector('.copy-label').textContent = 'Copied!';
          setTimeout(() => {
            copyBtn.classList.remove('copied');
            copyBtn.querySelector('.copy-label').textContent = 'Copy link';
          }, 2000);
        } catch {
          // Fallback for older browsers
          const el = document.createElement('textarea');
          el.value = 'https://hellojackmao.com';
          el.style.position = 'fixed'; el.style.opacity = '0';
          document.body.appendChild(el);
          el.select();
          document.execCommand('copy');
          document.body.removeChild(el);
          copyBtn.classList.add('copied');
          copyBtn.querySelector('.copy-label').textContent = 'Copied!';
          setTimeout(() => {
            copyBtn.classList.remove('copied');
            copyBtn.querySelector('.copy-label').textContent = 'Copy link';
          }, 2000);
        }
      });
    }

    // Page transition
    (function() {
      const root = document.documentElement;
      const veil = document.getElementById('page-veil');
      const rm   = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
      const supportsVT = 'startViewTransition' in document;
      const ready = () => { root.classList.remove('page-leaving'); root.classList.add('page-ready'); };
      if (veil && !rm && !supportsVT) { requestAnimationFrame(() => requestAnimationFrame(ready)); }
      else { ready(); }
      window.addEventListener('pageshow', e => {
        if (e.persisted) {
          if (veil) { veil.style.opacity = '0'; veil.style.pointerEvents = 'none'; }
          root.classList.remove('page-leaving'); root.classList.add('page-ready');
        }
      });
      document.addEventListener('click', e => {
        const link = e.target.closest('a[href]');
        if (!link || e.defaultPrevented || e.metaKey || e.ctrlKey || e.shiftKey || e.altKey) return;
        if (link.target === '_blank' || link.hasAttribute('download')) return;
        const href = link.getAttribute('href');
        if (!href || href.startsWith('mailto:') || href.startsWith('tel:') || href.startsWith('#')) return;
        let url; try { url = new URL(href, window.location.href); } catch { return; }
        if (url.origin !== window.location.origin) return;
        if (url.pathname === window.location.pathname && !url.hash) return;
        e.preventDefault();
        if (supportsVT && !rm) {
          document.startViewTransition(() => { window.location.href = url.href; });
        } else if (veil && !rm) {
          root.classList.remove('page-ready'); root.classList.add('page-leaving');
          setTimeout(() => { window.location.href = url.href; }, 320);
        } else { window.location.href = url.href; }
      });
    })();
  </script>
